name: Render and publish Quarto practicals

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::gt

      - name: Create site directory
        run: |
          mkdir -p _site

      - name: Render all practicals
        run: |
          for file in */index.qmd; do
            folder=$(dirname "$file")
            echo "Rendering $file"
            quarto render "$file" \
              --output-dir "../_site/$folder"
          done

      - name: Create homepage
        run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>My Practical Work</title>
          </head>
          <body>
          <h1>My Practical Work</h1>
          <ul>
          EOF

          for file in */index.qmd; do
            folder=$(dirname "$file")
            echo "<li><a href=\"$folder/index.html\">$folder</a></li>" >> _site/index.html
          done

          cat >> _site/index.html << 'EOF'
          </ul>
          </body>
          </html>
          EOF

      - name: Upload rendered site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4